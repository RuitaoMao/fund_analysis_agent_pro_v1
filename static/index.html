<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基金分析 Agent</title>
  <!-- Noto Sans/Serif SC 用于呼应 efund 的中文排版风格 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="logo">基金分析 · Agent</h1>
      <div class="card">
        <label>LLM 模式</label>
        <select id="mode">
          <option value="llm" selected>LLM</option>
          <option value="mock">Mock（规则）</option>
        </select>
      </div>
      <div class="card">
        <label>分析引擎</label>
        <select id="sql_mode">
          <option value="hard" selected>Hard tools（推荐）</option>
          <option value="generated">Generated SQL（灵活）</option>
        </select>
      </div>
      <div class="card">
        <label>最大重试步数</label>
        <input type="number" id="max_steps" min="1" max="5" value="3">
      </div>
      <div class="card">
        <label class="toggle">
          <input type="checkbox" id="use_long_memory" checked>
          读取长期 memory
        </label>
        <label class="toggle">
          <input type="checkbox" id="use_stream" checked>
          流式输出（推荐）
        </label>
      </div>
      <div class="card session-info">
        <div class="label">当前 SESSION</div>
        <code id="session_id"></code>
        <button id="new_session_btn">开启新 session</button>
      </div>
      <div class="card">
        <div class="label">简单问题（点击填入）</div>
        <button class="example">易方达目前旗下所有基金的总规模是多少</button>
        <button class="example">本年以来收益率最高的10只基金是哪些</button>
        <button class="example">持有贵州茅台规模最大的前5家基金公司是哪些</button>
      </div>
      <div class="card">
        <div class="label">深度分析问题（点击填入）</div>
        <button class="example">对比分析易方达和华夏基金，从各类资产规模、产品业绩、重仓持仓等角度做全面分析</button>
        <button class="example">对比分析易方达、华夏、广发三家头部基金公司的业务结构和发展路径，识别各自的差异化优势</button>
        <button class="example">分析本年以来主动权益基金的业绩分化情况，包括头部基金的共同特征（公司归属、规模区间、风险水平）以及收益与回撤的匹配关系</button>
        <button class="example">分析本年以来收益最高的主动权益基金的持仓特征，包括共同重仓股、持仓集中度、所属基金公司的分布规律</button>
        <button class="example">筛选本年以来超额收益超过5%且最大回撤低于10%的基金，并分析这批"高超额低回撤"基金的共同特征和所属公司分布</button>
      </div>
      <div class="card hint">
        提示：可以同时打开多个 tab 并行提问，互不阻塞。
      </div>
    </aside>

    <main class="main">
      <header class="hero">
        <h2>基金数据分析 AI Agent</h2>
        <p>基于规模、持仓、业绩三大数据域 · ReAct 闭环 · 自动复杂度路由 · 双轨输出（简洁结论 / 深度报告）</p>
      </header>

      <div class="chat" id="chat"></div>

      <div class="composer">
        <textarea id="query" placeholder="输入您的基金分析问题。简单查询会给出简洁结论，分析性问题会输出完整报告。" rows="2"></textarea>
        <button id="send_btn">提问</button>
      </div>
    </main>

    <aside class="trace-panel" id="trace_panel">
      <h3>EXECUTION TRACE</h3>
      <div id="trace_list"></div>
    </aside>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
