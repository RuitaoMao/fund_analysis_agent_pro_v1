<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基金分析 Agent</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="logo">📊 基金分析 Agent</h1>
      <div class="card">
        <label>LLM 模式</label>
        <select id="mode">
          <option value="llm" selected>LLM</option>
          <option value="mock">Mock（规则）</option>
        </select>
      </div>
      <div class="card">
        <label>分析引擎</label>
        <select id="sql_mode">
          <option value="hard" selected>Hard tools（推荐）</option>
          <option value="generated">Generated SQL（灵活）</option>
        </select>
      </div>
      <div class="card">
        <label>最大重试步数</label>
        <input type="number" id="max_steps" min="1" max="5" value="3">
      </div>
      <div class="card">
        <label class="toggle">
          <input type="checkbox" id="use_long_memory" checked>
          读取长期 memory
        </label>
        <label class="toggle">
          <input type="checkbox" id="use_stream" checked>
          流式输出（推荐）
        </label>
      </div>
      <div class="card session-info">
        <div class="label">当前 session</div>
        <code id="session_id"></code>
        <button id="new_session_btn">开启新 session</button>
      </div>
      <div class="card">
        <div class="label">📗 简单问题（点击填入）</div>
        <button class="example">易方达目前旗下所有基金的总规模是多少</button>
        <button class="example">全市场基金规模前10的基金公司是哪些，每家管理了多少亿</button>
        <button class="example">易方达旗下各类资产规模分别是多少</button>
        <button class="example">持仓宁德时代净值占比最高的5只基金是哪些</button>
        <button class="example">帮我查一下易方达蓝筹精选的基本信息</button>
      </div>
      <div class="card">
        <div class="label">📙 复杂问题（点击填入）</div>
        <button class="example">本年以来最大回撤最小的主动权益基金前10只</button>
        <button class="example">本年以来超额收益超过5%且最大回撤低于10%的基金有哪些</button>
        <button class="example">本年以来收益最高的5只主动权益基金，各自的第一大重仓股是什么</button>
        <button class="example">全市场基金公司中，持有贵州茅台规模最大的前5家是哪些</button>
        <button class="example">规模超过50亿且本年以来收益为正的主动权益基金有哪些，按规模排序</button>
      </div>
      <div class="card hint">
        💡 提示：可以同时打开多个 tab 并行提问，互不阻塞。
      </div>
    </aside>

    <main class="main">
      <header class="hero">
        <h2>基金数据分析 AI Agent</h2>
        <p>基于规模、持仓、业绩三张表，支持 ReAct 闭环、自动复杂度路由、原生 interrupt clarify。</p>
      </header>

      <div class="chat" id="chat"></div>

      <div class="composer">
        <textarea id="query" placeholder="输入你的基金分析问题，例如：本年以来超额收益超过5%且最大回撤低于10%的基金有哪些" rows="2"></textarea>
        <button id="send_btn">提问</button>
      </div>
    </main>

    <aside class="trace-panel" id="trace_panel">
      <h3>Trace</h3>
      <div id="trace_list"></div>
    </aside>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
