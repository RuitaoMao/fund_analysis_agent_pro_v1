# ================================================================
# 基金分析 Agent — Demo Eval Set
#
# 共 15 题：5 简单 + 10 复杂
# 简单（s001–s005）：单工具可覆盖，验证基础查询正确性
# 复杂（c001–c010）：多工具/分析/对比/边界，含两个 manager 关心的样例
#
# 运行命令：
#   python evaluation/run_batch_html_reports.py
#
# 只跑某几题：
#   python evaluation/run_batch_html_reports.py --ids s001,c001
#
# 切换 SQL 路径：
#   python evaluation/run_batch_html_reports.py --sql-modes generated
#   python evaluation/run_batch_html_reports.py --sql-modes hard,generated  # 双跑对比
# ================================================================

defaults:
  mode: llm
  sql_modes: hard, generated   # 每题默认同时跑 hard 和 generated
  max_steps: 3
  use_long_memory: false


questions:

  # ════════════════════════════════════════════════════════════════
  # 简单问题（s001–s005）
  # ════════════════════════════════════════════════════════════════

  - id: s001
    category: company_size
    # 触发技能：company_profile + 走 query_company_size
    query: 易方达目前旗下所有基金的总规模是多少
    expected_keywords: [易方达, 亿]

  - id: s002
    category: company_size
    # 触发技能：competitive_landscape + 走 query_company_size（无 companies 参数 → 全市场排名）
    query: 全市场基金规模前10的基金公司是哪些，每家管理了多少亿
    expected_keywords: [易方达, 华夏, 亿]

  - id: s003
    category: fund_performance
    # 触发技能：performance_analysis + 走 query_fund_performance
    query: 本年以来收益率最高的10只基金是哪些
    expected_keywords: [收益, 基金]

  - id: s004
    category: lookup
    # 触发技能：simple_lookup + 走 lookup_fund，应有"直接回答"
    query: 帮我查一下易方达蓝筹精选这只基金的基本信息
    expected_keywords: [易方达蓝筹精选, 005827]

  - id: s005
    category: stock_holders
    # 触发技能：stock_holder_analysis + 走 query_stock_holders(group_by=company)
    query: 持有贵州茅台规模最大的前5家基金公司是哪些
    expected_keywords: [贵州茅台, 华夏, 亿]


  # ════════════════════════════════════════════════════════════════
  # 复杂问题（c001–c010）
  # 全部为开放式分析题，期望系统输出多角度结构化报告
  # （而非"找出 X 数据"这种点查类问题）
  # ════════════════════════════════════════════════════════════════

  # ── manager 关心的两道样例（c001–c002）──────────────────────────

  - id: c001
    category: company_comparison
    # 触发技能：company_comparison
    # 期望多维分析：规模/业务结构/业绩/持仓特征/综合评价
    query: 对比分析易方达和华夏基金，从各类资产规模、产品业绩、重仓持仓等角度做全面分析
    expected_keywords: [易方达, 华夏, 规模, 亿]

  - id: c002
    category: market_landscape
    # 触发技能：competitive_landscape
    # 期望分析：全市场规模变化、各资产类型头部公司、行业集中度
    query: 对一季度公募基金规模竞争格局进行分析，包括全市场总规模、各类型基金（主动权益、被动权益、纯债、现金管理）里的头部基金公司排名
    expected_keywords: [基金公司, 规模, 主动权益]

  # ── 多家公司多维度对比（c003）─────────────────────────────────

  - id: c003
    category: company_comparison
    # 触发技能：company_comparison（三家公司）
    # 期望分析：三家公司业务侧重点的差异、各自的优劣
    query: 对比分析易方达、华夏、广发三家头部基金公司的业务结构和发展路径，识别各自的差异化优势
    expected_keywords: [易方达, 华夏, 广发, 规模]

  # ── 业绩格局深度分析（c004）───────────────────────────────────

  - id: c004
    category: fund_performance
    # 触发技能：performance_analysis
    # 期望分析：业绩分布、头部基金共同特征、风险收益匹配
    query: 分析本年以来主动权益基金的业绩分化情况，包括头部基金的共同特征（公司归属、规模区间、风险水平）以及收益与回撤的匹配关系
    expected_keywords: [主动权益, 收益, 回撤]

  # ── 单只股票的持仓格局分析（c005）─────────────────────────────

  - id: c005
    category: stock_holders
    # 触发技能：stock_holder_analysis
    # 期望分析：哪些公司重仓、机构集中度、持仓基金类型分布
    query: 分析公募基金对宁德时代的持仓格局，从持仓规模最大的基金公司、机构集中度、不同资产类型基金的配置差异等角度切入
    expected_keywords: [宁德时代, 公司, 净值]

  # ── 业绩+持仓联动分析（c006）──────────────────────────────────

  - id: c006
    category: performance_holdings
    # 触发技能：performance_analysis + holdings
    # 期望分析：高收益基金的共同重仓股、持仓集中度、风格画像
    query: 分析本年以来收益最高的主动权益基金的持仓特征，包括共同重仓股、持仓集中度、所属基金公司的分布规律
    expected_keywords: [主动权益, 收益, 持仓]

  # ── 高质量基金筛选+特征分析（c007）────────────────────────────

  - id: c007
    category: screen_funds
    # 触发技能：screening_result
    # 期望分析：不只列出筛选结果，还要总结这些基金的共同特征
    query: 筛选本年以来超额收益超过5%且最大回撤低于10%的基金，并分析这批"高超额低回撤"基金的共同特征和所属公司分布
    expected_keywords: [超额收益, 回撤, 基金]

  # ── Generated SQL 才能覆盖的分析（c008–c009）──────────────────

  - id: c008
    category: generated_sql_complex
    sql_modes: generated   # hard 工具无法做多股票交集 + 特征聚合
    # 期望分析：交集基金的画像而不仅是列表
    query: 分析同时重仓贵州茅台和宁德时代的主动权益基金，包括这类"跨赛道平衡型"基金的规模分布、公司归属、业绩表现特征
    expected_keywords: [贵州茅台, 宁德时代, 主动权益]

  - id: c009
    category: generated_sql_complex
    sql_modes: generated   # hard 工具无法做规模 TOP30 子集内的业绩分化分析
    # 期望分析：大盘基金内部的业绩分层
    query: 分析主动权益基金中规模前30只的业绩分化情况，识别其中收益领先和落后的基金分别有什么共同点
    expected_keywords: [主动权益, 规模, 收益]

  # ── 边界测试：空结果（c010）───────────────────────────────────

  - id: c010
    category: edge_case
    # 触发技能：兜底；期望系统优雅返回"无符合条件"而非报错
    query: 不存在的基金公司XYZ旗下有哪些基金
    expected_keywords: []
    expect_empty: true
