# ================================================================
# 基金分析 Agent — 批量评测问题集
#
# 用法（需先启动 FastAPI 服务 或 直接 python 命令行运行）：
#
#   全量跑（每题 hard + generated 两种路径，共约 50 个子任务）：
#     python evaluation/run_batch_html_reports.py
#
#   只跑 generated SQL 路径（速度更快，适合验证 LLM SQL）：
#     python evaluation/run_batch_html_reports.py --sql-modes generated
#
#   只跑 hard 工具路径：
#     python evaluation/run_batch_html_reports.py --sql-modes hard
#
#   只跑某几题（调试用）：
#     python evaluation/run_batch_html_reports.py --ids q001,q009,q016
# ================================================================

defaults:
  mode: llm                   # 使用真实 LLM
  sql_modes: hard,generated   # 每题默认同时跑 hard 和 generated，生成对比结果
  max_steps: 3
  use_long_memory: false

questions:

  # ── 1. 基金规模 ─────────────────────────────────────────────────────────
  # Hard 对应工具：query_fund_size
  # Generated 对应 SQL：SELECT fund_size FROM fund_size WHERE ...
  - id: q001
    category: fund_size
    query: 易方达目前旗下所有基金的总规模是多少
    expected_keywords: [易方达, 亿]
    cross_mode_check: true

  - id: q002
    category: fund_size
    query: 规模最大的10只主动权益基金是哪些，按规模排序
    expected_keywords: [主动权益, 亿]

  # ── 2. 基金公司规模 ─────────────────────────────────────────────────────
  # Hard 对应工具：query_company_size
  - id: q003
    category: company_size
    query: 全市场基金规模前10的基金公司是哪些，每家管理了多少亿
    expected_keywords: [易方达, 华夏, 广发, 亿]

  - id: q004
    category: company_size
    query: 易方达旗下各类资产规模分别是多少
    expected_keywords: [易方达, 主动权益, 亿]

  # ── 3. 基金业绩 ─────────────────────────────────────────────────────────
  # Hard 对应工具：query_fund_performance
  - id: q005
    category: fund_performance
    query: 本年以来收益率最高的10只基金是哪些
    expected_keywords: [收益, 基金]

  - id: q006
    category: fund_performance
    query: 本年以来最大回撤最小的主动权益基金前10只
    expected_keywords: [回撤, 基金]
    expected_not_contain: ["-22", "-21", "-20"]   # 这些是回撤最大的基金，不应出现
    cross_mode_check: true                         # hard/generated 结果应一致

  # ── 4. 基金持仓 ─────────────────────────────────────────────────────────
  # Hard 对应工具：query_fund_holdings
  - id: q007
    category: fund_holdings
    query: 易方达蓝筹精选最新的前10大重仓股是什么
    expected_keywords: [易方达蓝筹精选, 贵州茅台]

  - id: q008
    category: fund_holdings
    query: 005827这只基金持仓集中度怎么样，前十大持仓占净值多少
    expected_keywords: [005827, 净值]

  # ── 5. 股票持有者分析 ───────────────────────────────────────────────────
  # Hard 对应工具：query_stock_holders（group_by 参数区分三种聚合维度）
  - id: q009
    category: stock_holders
    query: 全市场基金公司中，持有贵州茅台规模最大的前5家是哪些
    expected_keywords: [贵州茅台, 易方达, 亿]

  - id: q010
    category: stock_holders
    query: 持仓宁德时代净值占比最高的5只基金是哪些
    expected_keywords: [宁德时代, 基金]

  - id: q011
    category: stock_holders
    query: 全市场基金最多共同持有的股票是哪些，前10名
    expected_keywords: [股票, 基金]

  # ── 6. 基金筛选（多条件） ───────────────────────────────────────────────
  # Hard 对应工具：screen_funds
  - id: q012
    category: screen_funds
    query: 规模超过50亿且本年以来收益为正的主动权益基金有哪些，按规模排序
    expected_keywords: [主动权益, 亿, 收益]

  - id: q013
    category: screen_funds
    query: 本年以来超额收益超过5%且最大回撤低于10%的基金有哪些
    expected_keywords: [超额收益, 回撤]
    expected_not_contain: ["-0.29", "-29"]   # 这些是超额收益为负的基金，不应出现
    cross_mode_check: true

  # ── 7. 业绩+持仓联查 ────────────────────────────────────────────────────
  # Hard 对应工具：query_performance_holdings
  - id: q014
    category: performance_holdings
    query: 本年以来收益最高的5只主动权益基金，各自的第一大重仓股是什么
    expected_keywords: [收益, 股票]

  # ── 8. 基金信息查询 ─────────────────────────────────────────────────────
  # Hard 对应工具：lookup_fund
  - id: q015
    category: lookup
    query: 帮我查一下易方达蓝筹精选这只基金的基本信息
    expected_keywords: [易方达蓝筹精选, 005827]

  # ── 9. Generated SQL 专项（复杂多表联查，hard 工具不擅长） ──────────────
  - id: q016
    category: generated_sql_complex
    sql_modes: generated
    query: 规模前50的主动权益基金中，同时持有贵州茅台和宁德时代的有哪些，按规模排序
    expected_keywords: [贵州茅台, 宁德时代, 主动权益]

  - id: q017
    category: generated_sql_complex
    sql_modes: generated
    query: 持仓贵州茅台净值占比超过5%的基金中，本年以来收益最好的前5只是哪些
    expected_keywords: [贵州茅台, 收益, 基金]

  - id: q018
    category: generated_sql_complex
    sql_modes: generated
    query: 规模前100基金中本年以来超额收益最高的10只
    expected_keywords: [超额收益, 基金]

  - id: q019
    category: generated_sql_complex
    sql_modes: generated
    query: 易方达和华夏谁更看好宁德时代
    expected_keywords: [易方达, 华夏, 宁德时代, 亿]

  - id: q020
    category: generated_sql_complex
    sql_modes: generated
    query: 持仓半导体相关股票占净值超过20%的主动权益基金有哪些
    expected_keywords: [主动权益, 基金]

  # ── 10. 边界 & 容错（只跑 generated，hard 工具对这类问题意义不大） ───────
  - id: q021
    category: edge_case
    sql_modes: generated   # 覆盖 defaults，只跑一种模式
    query: 规模超过10000亿的单只基金有哪些
    expected_keywords: []
    expect_empty: true     # 期望空结果，不期望报错

  - id: q022
    category: edge_case
    sql_modes: generated
    query: 不存在的基金公司XYZ旗下有哪些基金
    expected_keywords: []
    expect_empty: true
